<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Faculty Opportunities — iPhone Preview</title>
<style>
  html,body{margin:0;height:100%;background:#E9E9EF;
    font-family:-apple-system,system-ui,"Barlow",sans-serif;-webkit-font-smoothing:antialiased}
  body{height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .cap{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:9px;
    padding:12px 16px;color:#5b5f6b;font-size:13px;font-weight:600;text-align:center}
  .cap b{color:#28323F;font-weight:700}
  .cap .dot{width:7px;height:7px;border-radius:50%;background:#00AEEF;flex:0 0 auto}
  .stage{flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;padding:8px}
  .scaler{transform-origin:center center;will-change:transform}
  iframe{border:0;display:block;background:#fff}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
</head>
<body>
  <div class="cap"><span class="dot"></span><span><b>Faculty Opportunities</b> — iPhone preview · scroll &amp; tap inside the device</span></div>
  <div class="stage"><div id="root"></div></div>
<script type="text/babel">
  const { IOSDevice } = window;
  const DEV_W = 402, DEV_H = 874;

  function Phone(){
    return (
      <div className="scaler">
        <IOSDevice width={DEV_W} height={DEV_H}>
          <iframe
            title="Faculty Opportunities mobile"
            src="index.html"
            style={{
              width:'100%', height:'100%', border:0,
              paddingTop:'48px', paddingBottom:'22px',
              boxSizing:'border-box', background:'#fff'
            }}
          ></iframe>
        </IOSDevice>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Phone/>);

  // Scale the device so it always fits the available stage.
  function fit(){
    const s = document.querySelector('.scaler');
    const stage = document.querySelector('.stage');
    if(!s || !stage) return;
    const pad = 16;
    const scale = Math.min(
      (stage.clientWidth  - pad*2) / DEV_W,
      (stage.clientHeight - pad*2) / DEV_H
    );
    s.style.transform = 'scale(' + Math.max(0.2, scale) + ')';
  }
  window.addEventListener('resize', fit);
  // run after mount + once more once layout settles
  requestAnimationFrame(fit);
  setTimeout(fit, 60);
  setTimeout(fit, 300);
</script>
</body>
</html>
